<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

        </tr>
        <tr>
            <td style="font-size: 22px;">Smartphone</td>
            <td style="font-size: 22px;">Apple</td>
            <td style="padding: 5px;">
                <table class="inner-table">
                    <tr style="background-color: yellow;">
                        <td class="inner-header">Model</td>
                        <td class="inner-header">Storage</td>
                    </tr>
                    <tr>
                        <td>iPhone 12 Pro</td>
                        <td>256GB</td>
                    </tr>
                    <tr>
                        <td>iPhone SE</td>
                        <td>128GB</td>
                    </tr>
                </table>

        </tr>
        <tr>
            <td>Laptop</td>

            <td>15.6" Display</td>
        </tr>
        <tr>
            <td>Tablet</td>
            <td>Samsung</td>
            <td>10.5" Display</td>
        </tr>
    </table>

</html>
